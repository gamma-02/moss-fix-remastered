plugins {
    id 'com.github.johnrengelman.shadow'
}

architectury {
    platformSetupLoomIde()
    neoForge()
}

configurations {
    common {
        canBeResolved = true
        canBeConsumed = false
    }
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentNeoForge.extendsFrom common

    // Files in this configuration will be bundled into your mod using the Shadow plugin.
    // Don't use the `shadow` configuration from the plugin itself as it's meant for excluding files.
    shadowBundle {
        canBeResolved = true
        canBeConsumed = false
    }
}

repositories {
    maven {
        name = 'NeoForged'
        url = 'https://maven.neoforged.net/releases'
    }
    mavenCentral()
}

dependencies {
    if( rootProject.minecraft_version == "1.21.1") {
        neoForge "net.neoforged:neoforge:$rootProject.mc_1_21_1_neoforge_version"
    } else if (rootProject.minecraft_version == "1.21") {
        neoForge "net.neoforged:neoforge:$rootProject.mc_1_21_neoforge_version"
    } else if (rootProject.minecraft_version == "1.20.6"){
        neoForge "net.neoforged:neoforge:$rootProject.mc_1_20_6_neoforge_version"
    } else if (rootProject.minecraft_version == "1.20.5"){
        neoForge "net.neoforged:neoforge:$rootProject.mc_1_20_5_neoforge_version"
    } else if (rootProject.minecraft_version == "1.20.4"){
        neoForge "net.neoforged:neoforge:$rootProject.mc_1_20_4_neoforge_version"
    } else if (rootProject.minecraft_version == "1.20.3"){
        neoForge "net.neoforged:neoforge:$rootProject.mc_1_20_3_neoforge_version"
    } else if (rootProject.minecraft_version == "1.20.2"){
        neoForge "net.neoforged:neoforge:$rootProject.mc_1_20_2_neoforge_version"
    }

    // Add manifold to -processorpath for javac
    annotationProcessor 'systems.manifold:manifold-preprocessor:2026.1.6'

    common(project(path: ':common', configuration: 'namedElements')) { transitive false }
    shadowBundle project(path: ':common', configuration: 'transformProductionNeoForge')
}

modrinth {

//    debugMode = true

    if(!mainVersionMap.containsKey(rootProject.minecraft_version)){
        throw new GradleException("${rootProject.minecraft_version} is not a valid version for upload to Modrinth!")
    }

    if(!rootProject.hasProperty('MODRINTH_TOKEN') && gradle.startParameter.taskNames.contains("modrinth")){
        throw new GradleException("No Modrinth token found!")
    }

    token = rootProject.hasProperty('MODRINTH_TOKEN') ? rootProject.getProperty('MODRINTH_TOKEN') : "" // Remember to have the MODRINTH_TOKEN environment variable set or else this will fail - just make sure it stays private!
    projectId = "moss-fix" // This can be the project ID or the slug. Either will work!
    versionNumber = "${rootProject.mod_version}" // You don't need to set this manually. Will fail if Modrinth has this version already
    versionType = "release" // This is the default -- can also be `beta` or `alpha`
    uploadFile = remapJar // With Loom, this MUST be set to `remapJar` instead of `jar`!
    additionalFiles = [sourcesJar, shadowJar]
    gameVersions = mainVersionMap.get(rootProject.minecraft_version) // Must be an array, even with only one version

    loaders = ["neoforge"] // Must also be an array - no need to specify this if you're using Loom or ForgeGradle

    changelog = modrinth_changelog

    autoAddDependsOn = false
}

processResources {
    inputs.property 'version', project.version

    filesMatching('META-INF/*.toml') {
        expand version: project.version
    }

}

shadowJar {
    configurations = [project.configurations.shadowBundle]
    archiveClassifier = 'dev-shadow'
}

remapJar {
    input.set shadowJar.archiveFile
}
